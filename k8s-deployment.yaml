apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-fortress
  labels:
    app: knowledge-fortress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-fortress
  template:
    metadata:
      labels:
        app: knowledge-fortress
    spec:
      initContainers:
      - name: git-sync
        image: alpine/git
        command: ["/bin/sh", "-c"]
        args:
        - |
          git clone --recurse-submodules https://github.com/mrhavens/knowledge-engineering-fortress.git /src && cd /src && git checkout master
        volumeMounts:
        - name: hugo-src
          mountPath: /src
      containers:
      - name: hugo
        image: klakegg/hugo:ext-alpine
        command: ["hugo"]
        args: ["server", "--bind", "0.0.0.0", "-p", "80", "--appendPort=false", "--baseURL", "https://canon.thefoldwithin.earth/"]
        ports:
        - containerPort: 80
        volumeMounts:
        - name: hugo-src
          mountPath: /src
      volumes:
      - name: hugo-src
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-fortress-svc
spec:
  selector:
    app: knowledge-fortress
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: knowledge-fortress-ingress
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "cloudflare-letsencrypt"
spec:
  tls:
  - hosts:
    - canon.thefoldwithin.earth
    secretName: canon-tls-secret
  rules:
  - host: canon.thefoldwithin.earth
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: knowledge-fortress-svc
            port:
              number: 80
